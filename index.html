<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightFunded · Internal Dashboards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F1F5F9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo{width:48px;height:48px;background:linear-gradient(135deg,#2563EB,#7C3AED);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.logo svg{width:26px;height:26px;fill:#fff}
h1{font-size:22px;font-weight:800;color:#111827;text-align:center;letter-spacing:-.4px}
p{font-size:13px;color:#6B7280;text-align:center;margin-top:6px;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;width:100%;max-width:900px}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:24px;text-decoration:none;transition:box-shadow .15s,transform .1s;display:block}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.09);transform:translateY(-2px)}
.card-icon{width:36px;height:36px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:18px}
.card-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:4px}
.card-sub{font-size:12px;color:#9CA3AF}
.card-tag{display:inline-block;margin-top:12px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#EFF6FF;color:#2563EB;text-transform:uppercase;letter-spacing:.5px}
footer{margin-top:40px;font-size:11px;color:#D1D5DB}
</style>
</head>
<body>
<div class="logo"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
<h1>BrightFunded Dashboards</h1>
<p>Internal analytics · for authorized team members only</p>
<div class="grid">
  <a class="card" href="./passing-rate/">
    <div class="card-icon" style="background:#EFF6FF">📊</div>
    <div class="card-title">Passing Rate Dashboard</div>
    <div class="card-sub">Monthly & weekly pass rates by phase and country · rising alerts</div>
    <span class="card-tag">Live</span>
  </a>
</div>
<footer>BrightFunded · Internal use only</footer>
</body>
</html>
